name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        # Using `npm install` rather than `npm ci` because the lockfile is generated
        # on Windows (developer environment) and misses Linux-specific optional deps
        # like esbuild's Linux binary and @emnapi/*. `npm install` resolves these
        # on the CI runner without failing.
        run: npm install --no-audit --no-fund

      - name: Install server dependencies
        # Using `npm install` rather than `npm ci` because the lockfile is generated
        # on Windows (developer environment) and misses Linux-specific optional deps
        # like esbuild's Linux binary and @emnapi/*. `npm install` resolves these
        # on the CI runner without failing.
        run: npm install --no-audit --no-fund
        working-directory: ./server

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  smoke:
    # End-to-end runtime check that mirrors production deployment.
    #
    # Why this job exists: unit tests import the server code but never call
    # app.listen(), so validation errors that throw at server boot are missed.
    # Historical incidents this would have caught:
    #   - express-rate-limit v8 ERR_ERL_KEY_GEN_IPV6 (thrown during rateLimit() factory)
    #   - Express 5 path-to-regexp rejecting `app.get('*', ...)` (thrown at route registration)
    #   - Docker image build failures on native deps (better-sqlite3, bcryptjs)
    # Runs in parallel with test/lint so feedback stays fast.
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Inject host port mapping for smoke test
        # docker-compose.yml is committed without a ports: block (the VPS
        # uses Traefik labels / nginx-proxy-manager). For the smoke test
        # we need to expose the container on localhost:3002.
        run: |
          sed -i '/restart: unless-stopped/a\    ports:\n      - "3002:80"' docker-compose.yml

      - name: Create external network stub
        # docker-compose.yml references the external 'proxy-network' created
        # by nginx-proxy-manager on the VPS. In CI we just create an empty
        # network with the same name so compose can start.
        run: docker network create proxy-network || true

      - name: Create .env for CI
        # docker-compose.yml interpolates APP_SLUG (container_name) and
        # APP_DOMAIN (Traefik labels). These live in the VPS .env but not
        # in git. Provide stubs so compose can parse successfully.
        run: |
          cat > .env <<EOF
          APP_SLUG=ci-smoke
          APP_DOMAIN=smoke.local
          JWT_SECRET=ci-smoke-test-secret
          EOF

      - name: Build and start container
        run: docker compose up -d --build --force-recreate

      - name: Wait for server to respond
        # Retries for up to ~60s. If the server crashes on boot (like the
        # express-rate-limit / path-to-regexp incidents), it never listens
        # and this step times out, dumping logs to make the failure obvious.
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=1
          HTTP_CODE=""
          until [ "$ATTEMPT" -gt "$MAX_ATTEMPTS" ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 2 --max-time 5 http://localhost:3002 || true)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "304" ]; then
              echo "OK: Server responded with $HTTP_CODE after attempt $ATTEMPT"
              break
            fi
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: got ${HTTP_CODE:-curl_failed}; retrying..."
            sleep 2
            ATTEMPT=$((ATTEMPT + 1))
          done
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "304" ]; then
            echo "FAIL: Server did not become healthy after $MAX_ATTEMPTS attempts"
            echo "=== Container status ==="
            docker compose ps
            echo "=== Container logs ==="
            docker compose logs --tail 100 web
            exit 1
          fi

      - name: Smoke test public API endpoint
        # Exercises route registration and middleware stack — would catch
        # path-to-regexp / auth middleware errors that only trigger on request.
        run: |
          API_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3002/api/v1/roadmap/import)
          if [ "$API_CODE" != "401" ]; then
            echo "FAIL: /api/v1/roadmap/import without auth expected 401, got $API_CODE"
            docker compose logs --tail 50 web
            exit 1
          fi
          echo "OK: /api/v1/roadmap/import correctly returned 401 unauthenticated"

      - name: Cleanup
        if: always()
        run: docker compose down --volumes --remove-orphans
